name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Get tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  build-server:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: apihop-server-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: apihop-server-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: apihop-server-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: apihop-server-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: apihop-server-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd ui
          bun install
          bun run build

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build server
        run: cargo build --release --target ${{ matrix.target }} -p apihop-server

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/apihop-server ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/apihop-server.exe ${{ matrix.name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libdbus-1-dev

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd ui
          bun install
          bun run build

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli@^2 --locked

      - name: Build desktop app
        working-directory: crates/desktop
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe

  publish-release:
    needs: [build-server, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false

  update-homebrew:
    needs: [publish-release, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets and compute checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.tag }}
        run: |
          for name in apihop-server-macos-arm64 apihop-server-macos-amd64 apihop-server-linux-amd64 apihop-server-linux-arm64; do
            gh release download "$VERSION" --repo saturn4er/apihop --pattern "$name" --dir .
            sha=$(sha256sum "$name" | awk '{print $1}')
            echo "SHA_${name//-/_}=$sha" >> "$GITHUB_ENV"
          done

          # Source tarball checksum
          gh release download "$VERSION" --repo saturn4er/apihop --archive=tar.gz --dir .
          sha=$(sha256sum *.tar.gz | awk '{print $1}')
          echo "SHA_SOURCE=$sha" >> "$GITHUB_ENV"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: saturn4er/homebrew-apihop
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cat > Formula/apihop.rb << 'RUBY'
          class Apihop < Formula
            desc "Fast, open-source API client for REST, GraphQL, and WebSocket"
            homepage "https://github.com/saturn4er/apihop"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            if build.head?
              head "https://github.com/saturn4er/apihop.git", branch: "master"
            elsif build.bottle? || !build.build_from_source?
              on_macos do
                if Hardware::CPU.arm?
                  url "https://github.com/saturn4er/apihop/releases/download/vVERSION_PLACEHOLDER/apihop-server-macos-arm64"
                  sha256 "SHA_MACOS_ARM64_PLACEHOLDER"
                else
                  url "https://github.com/saturn4er/apihop/releases/download/vVERSION_PLACEHOLDER/apihop-server-macos-amd64"
                  sha256 "SHA_MACOS_AMD64_PLACEHOLDER"
                end
              end

              on_linux do
                if Hardware::CPU.arm?
                  url "https://github.com/saturn4er/apihop/releases/download/vVERSION_PLACEHOLDER/apihop-server-linux-arm64"
                  sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
                else
                  url "https://github.com/saturn4er/apihop/releases/download/vVERSION_PLACEHOLDER/apihop-server-linux-amd64"
                  sha256 "SHA_LINUX_AMD64_PLACEHOLDER"
                end
              end
            else
              url "https://github.com/saturn4er/apihop/archive/refs/tags/vVERSION_PLACEHOLDER.tar.gz"
              sha256 "SHA_SOURCE_PLACEHOLDER"
            end

            depends_on "rust" => :build
            depends_on "node" => :build

            def install
              if Dir.glob("apihop-server-*").any?
                bin.install Dir.glob("apihop-server-*").first => "apihop"
              else
                system "npm", "install", "-g", "bun"
                cd "ui" do
                  system "bun", "install"
                  system "bun", "run", "build"
                end
                system "cargo", "build", "--release", "-p", "apihop-server"
                bin.install "target/release/apihop-server" => "apihop"
              end
            end

            test do
              assert_match "apihop", shell_output("#{bin}/apihop --help 2>&1", 1)
            end
          end
          RUBY

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Formula/apihop.rb
          sed -i "s/SHA_MACOS_ARM64_PLACEHOLDER/$SHA_apihop_server_macos_arm64/g" Formula/apihop.rb
          sed -i "s/SHA_MACOS_AMD64_PLACEHOLDER/$SHA_apihop_server_macos_amd64/g" Formula/apihop.rb
          sed -i "s/SHA_LINUX_AMD64_PLACEHOLDER/$SHA_apihop_server_linux_amd64/g" Formula/apihop.rb
          sed -i "s/SHA_LINUX_ARM64_PLACEHOLDER/$SHA_apihop_server_linux_arm64/g" Formula/apihop.rb
          sed -i "s/SHA_SOURCE_PLACEHOLDER/$SHA_SOURCE/g" Formula/apihop.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/apihop.rb
          git commit -m "Update apihop to ${{ needs.create-release.outputs.tag }}"
          git push
