name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ${{ steps.changelog.outputs.content }}

  build-server:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: apihop-server-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: apihop-server-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: apihop-server-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: apihop-server-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: apihop-server-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64

          # Rewrite all apt sources to only fetch amd64, then add arm64 via ports
          # Handle .list files (skip lines already having [arch=])
          sudo find /etc/apt/sources.list.d/ -name '*.list' -exec sed -i '/\[arch=/!s/^deb /deb [arch=amd64] /' {} +
          [ -f /etc/apt/sources.list ] && sudo sed -i '/\[arch=/!s/^deb /deb [arch=amd64] /' /etc/apt/sources.list

          # Handle DEB822 .sources files: add Architectures: amd64 after Types: line if not present
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] || continue
            if ! grep -q '^Architectures:' "$f"; then
              sudo sed -i '/^Types:/a Architectures: amd64' "$f"
            else
              sudo sed -i 's/^Architectures:.*/Architectures: amd64/' "$f"
            fi
          done

          # Add arm64 sources from ports.ubuntu.com
          CODENAME=$(lsb_release -cs)
          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME} main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-updates main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-security main restricted universe
          EOF

          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd ui
          bun install
          bun run build

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build server
        run: cargo build --release --target ${{ matrix.target }} -p apihop-server

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/apihop-server ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/apihop-server.exe ${{ matrix.name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libdbus-1-dev

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd ui
          bun install
          bun run build

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli@^2 --locked

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          cd crates/desktop
          # Use node to safely update JSON
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build desktop app
        working-directory: crates/desktop
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe

  publish-release:
    needs: [build-server, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false

  update-homebrew:
    needs: [publish-release, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Compute checksums
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.create-release.outputs.tag }}
          SEMVER: ${{ needs.create-release.outputs.version }}
        run: |
          # Source tarball
          gh release download "$VERSION" --repo saturn4er/apihop --archive=tar.gz --dir .
          echo "SHA_SOURCE=$(sha256sum *.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

          # macOS DMGs
          gh release download "$VERSION" --repo saturn4er/apihop \
            --pattern "apihop_${SEMVER}_aarch64.dmg" \
            --pattern "apihop_${SEMVER}_x64.dmg" \
            --dir . || true
          if [ -f "apihop_${SEMVER}_aarch64.dmg" ]; then
            echo "SHA_DMG_ARM=$(sha256sum apihop_${SEMVER}_aarch64.dmg | awk '{print $1}')" >> "$GITHUB_ENV"
          fi
          if [ -f "apihop_${SEMVER}_x64.dmg" ]; then
            echo "SHA_DMG_INTEL=$(sha256sum apihop_${SEMVER}_x64.dmg | awk '{print $1}')" >> "$GITHUB_ENV"
          fi

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: saturn4er/homebrew-apihop
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula version and SHA
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          sed -i "s|url \"https://github.com/saturn4er/apihop/archive/refs/tags/v.*\.tar\.gz\"|url \"https://github.com/saturn4er/apihop/archive/refs/tags/v${VERSION}.tar.gz\"|" Formula/apihop.rb
          sed -i "s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA_SOURCE}\"/" Formula/apihop.rb
          # Remove any existing bottle block so tap CI rebuilds it
          sed -i '/^  bottle do$/,/^  end$/d' Formula/apihop.rb

      - name: Update cask version and SHAs
        if: env.SHA_DMG_ARM != '' || env.SHA_DMG_INTEL != ''
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/apihop.rb
          if [ -n "$SHA_DMG_ARM" ]; then
            # Replace the sha256 inside on_arm block (first sha256 after on_arm)
            sed -i "/on_arm do/,/end/{s/sha256 \".*\"/sha256 \"${SHA_DMG_ARM}\"/}" Casks/apihop.rb
          fi
          if [ -n "$SHA_DMG_INTEL" ]; then
            # Replace the sha256 inside on_intel block (first sha256 after on_intel)
            sed -i "/on_intel do/,/end/{s/sha256 \".*\"/sha256 \"${SHA_DMG_INTEL}\"/}" Casks/apihop.rb
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/apihop.rb Casks/apihop.rb
          git diff --cached --quiet || git commit -m "Update apihop to ${{ needs.create-release.outputs.tag }}"
          git push
